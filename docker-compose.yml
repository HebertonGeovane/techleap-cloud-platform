services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=senha_local
  db:
    image: postgres:alpine
    environment:
      POSTGRES_DB: techleapdb
      POSTGRES_PASSWORD: senha_local